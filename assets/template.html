<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{pageTitle}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <nav class="sticky-top navbar navbar-expand-lg bg-dark" data-bs-theme="dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">SRi - UKSR - Sunday GT3 Championship Season 19</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    {navItems}
                </ul>
            </div>
        </div>
    </nav>

    <header class="mt-4 container">
        <h1>{headingTitle}</h1>
    </header>

    <div class="mt-4 table-responsive">
        <table class="table table-striped table-hover">
            <thead>
                <tr>
                    <th class="text-nowrap text-center">Position</th>
                    <th class="text-nowrap">Driver</th>
                    <th class="text-nowrap">Team</th>
                    <th class="text-nowrap text-center">Points</th>
                    {roundHeaders}
                </tr>
            </thead>
            <tbody>
                {tableRows}
            </tbody>
        </table>
    </div>
</body>
</html>
